<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Markets | Landing Page Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6635de;
            --secondary: #7f54f8;
            --background: #0a0614;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(102, 53, 222, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(127, 84, 248, 0.1) 0%, transparent 40%);
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--secondary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(102, 53, 222, 0.2);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: 0.5s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, #a8a8a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-title {
            background: linear-gradient(135deg, #6635de 0%, #7f54f8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .category-badge {
            background: rgba(102, 53, 222, 0.2);
            color: #cebdff;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: 1px solid rgba(102, 53, 222, 0.3);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(102, 53, 222, 0.2), rgba(127, 84, 248, 0.2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid rgba(102, 53, 222, 0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="p-8 md:p-16">
    <div class="max-w-7xl mx-auto">
        <header class="mb-16 animate-fade-in">
            <h1 class="text-5xl md:text-7xl font-bold mb-4 tracking-tight">
                Bridge <span class="hero-title">Markets</span>
            </h1>
            <p class="text-xl text-gray-400 max-w-2xl font-light">
                Explora el ecosistema de landings profesionales. Diseños de alta conversión optimizados para el mercado financiero moderno.
            </p>
        </header>

        <div class="grid-container">
            <!-- Landing Cards will be injected or listed here -->
            <script>
                const landings = [
                    { id: 1, title: "Pro Trading v1", category: "Standard" },
                    { id: 2, title: "Market Insights", category: "Analytics" },
                    { id: 3, title: "Liquidity Node", category: "Institutional" },
                    { id: 4, title: "Crystal Dashboard", category: "Modern" },
                    { id: 5, title: "Dark Horizon", category: "Premium" },
                    { id: 6, title: "Alpha Stream", category: "High Conversion" },
                    { id: 7, title: "Bridge Core", category: "Corporate" },
                    { id: 8, title: "Trade Flow", category: "Dynamic" },
                    { id: 9, title: "Quantum Edge", category: "Tech" },
                    { id: 10, title: "Nexus Portal", category: "Gateway" },
                    { id: 11, title: "Stellar Assets", category: "Crypto" },
                    { id: 12, title: "Prime Access", category: "VIP" },
                    { id: 13, title: "Universo Sintéticos v1", category: "Evolution" },
                    { id: 14, title: "Universo Sintéticos v2", category: "Featured" }
                ];

                const container = document.querySelector('.grid-container');

                landings.forEach((landing, index) => {
                    const card = document.createElement('div');
                    card.className = 'glass-card p-8 animate-fade-in';
                    card.style.animationDelay = `${index * 0.05}s`;
                    card.onclick = () => window.open(`Landing ${landing.id}.html`, '_blank');

                    card.innerHTML = `
                        <div class="icon-box">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#cebdff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="9" y1="21" x2="9" y2="9"></line>
                            </svg>
                        </div>
                        <div class="category-badge mb-4 inline-block">${landing.category}</div>
                        <h3 class="text-2xl font-bold mb-2 gradient-text">Landing ${landing.id}</h3>
                        <p class="text-gray-400 text-sm mb-6">${landing.title}</p>
                        <div class="flex items-center text-primary font-semibold text-sm group">
                            Visualizar Landing 
                            <svg class="ml-2 transform group-hover:translate-x-1 transition-transform" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </div>
                    `;
                    container.appendChild(card);
                });
            </script>
        </div>

        <footer class="mt-24 pt-8 border-t border-white/10 text-center text-gray-500 text-sm">
            <p>© 2024 Bridge Markets Design System. Optimizado para navegación rápida.</p>
        </footer>
    </div>
</body>
</html>
